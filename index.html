<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<!-- Фиксиран мащаб: спира зумирането в Safari при двойно докосване и при фокус върху поле -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1f2933">
<!-- За добавяне към началния екран (iOS Safari) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Маси">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">
<title>Маси — Ресторант</title>
<!-- Firebase (споделена база в реално време). Ако не се заредят, приложението работи локално. -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  :root {
    --bg: #11161c;
    --panel: #1f2933;
    --panel-2: #2a3744;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --free: #16a34a;       /* свободна — зелено */
    --free-d: #0f7a37;
    --waiting: #dc2626;    /* чака ястия — червено (премигва) */
    --waiting-d: #991b1b;
    --busy: #f59e0b;       /* заета / всичко занесено — оранжево */
    --busy-d: #b45309;
    --accent: #3b82f6;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-text-size-adjust: 100%;
    overscroll-behavior: none;
  }
  body {
    padding: max(env(safe-area-inset-top), 10px) max(env(safe-area-inset-right), 10px)
             max(env(safe-area-inset-bottom), 10px) max(env(safe-area-inset-left), 10px);
    min-height: 100vh;
  }
  header.app-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; margin-bottom: 8px;
  }
  header.app-head h1 { font-size: 20px; margin: 0; font-weight: 700; }
  .legend { display: flex; gap: 10px; flex-wrap: wrap; font-size: 12px; color: var(--muted); }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .dot { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
  .dot.free { background: var(--free); }
  .dot.waiting { background: var(--waiting); }
  .dot.busy { background: var(--busy); }

  /* Лента: кой съм аз + статус на връзката */
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .me-btn {
    background: var(--panel-2); color: var(--text); border: 1px solid #3a4a5a;
    border-radius: 10px; padding: 9px 12px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .sync { font-size: 12px; color: var(--muted); white-space: nowrap; }

  /* Филтър по оператор (хоризонтално скролване) */
  .opfilter { display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch;
    padding-bottom: 4px; margin-bottom: 6px; }
  .opfilter::-webkit-scrollbar { display: none; }
  .opchip {
    flex: 0 0 auto; background: var(--panel-2); color: var(--text);
    border: 1px solid #3a4a5a; border-radius: 999px; padding: 6px 12px;
    font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap;
  }
  .opchip.sel { background: var(--accent); border-color: var(--accent); color: #fff; }

  .zone { margin: 14px 0; }
  .zone h2 {
    font-size: 14px; color: var(--muted); text-transform: uppercase;
    letter-spacing: .5px; margin: 0 0 8px 2px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(86px, 1fr));
    gap: 10px;
  }
  .table {
    border: none; cursor: pointer;
    border-radius: 14px; padding: 12px 6px;
    color: #fff; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    min-height: 84px; justify-content: center;
    font-family: inherit;
    box-shadow: 0 2px 6px rgba(0,0,0,.3);
    transition: transform .05s ease, opacity .15s ease;
  }
  .table:active { transform: scale(.96); }
  .table .num { font-size: 26px; font-weight: 800; line-height: 1; }
  .table .st { font-size: 11px; opacity: .95; }
  .table .op {
    font-size: 11px; background: rgba(0,0,0,.28); padding: 1px 7px; border-radius: 8px;
    max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .table .badge {
    font-size: 11px; background: rgba(0,0,0,.25);
    padding: 1px 7px; border-radius: 10px;
  }
  .table.free { background: linear-gradient(160deg, var(--free), var(--free-d)); }
  .table.busy { background: linear-gradient(160deg, var(--busy), var(--busy-d)); }
  .table.waiting {
    background: linear-gradient(160deg, var(--waiting), var(--waiting-d));
    animation: blink 1s ease-in-out infinite;
  }
  .table.dim { opacity: .3; }
  .table.hl { outline: 3px solid #fff; outline-offset: -2px; }
  @keyframes blink {
    0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,.0), 0 2px 6px rgba(0,0,0,.3); opacity: 1; }
    50%      { box-shadow: 0 0 0 5px rgba(220,38,38,.55), 0 2px 6px rgba(0,0,0,.3); opacity: .85; }
  }
  @media (prefers-reduced-motion: reduce) {
    .table.waiting { animation: none; outline: 3px solid #fff5; }
  }

  /* ===== Панел за маса ===== */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.55);
    display: none; align-items: flex-end; justify-content: center; z-index: 50;
  }
  .overlay.open { display: flex; }
  .sheet {
    background: var(--panel); width: 100%; max-width: 560px;
    border-radius: 18px 18px 0 0; padding: 16px;
    padding-bottom: max(env(safe-area-inset-bottom), 16px);
    /* буфер отгоре: панелът спира на ~110px от върха */
    max-height: calc(100% - 110px); display: flex; flex-direction: column;
    animation: up .18s ease;
  }
  /* при отворена клавиатура ползваме цялата налична височина */
  .overlay.kb .sheet { max-height: 100%; }
  @keyframes up { from { transform: translateY(30px); opacity: .6; } to { transform: none; opacity: 1; } }
  .sheet-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .sheet-head h3 { margin: 0; font-size: 22px; }
  .status-pill { font-size: 12px; padding: 4px 10px; border-radius: 12px; color:#fff; font-weight:600; }
  .status-pill.free { background: var(--free); }
  .status-pill.waiting { background: var(--waiting); }
  .status-pill.busy { background: var(--busy); }
  .close-btn { background: var(--panel-2); border: none; color: var(--text); font-size: 22px;
    width: 38px; height: 38px; border-radius: 10px; line-height: 1; cursor: pointer; }

  /* Оператор на масата (в панела) */
  .sheet-op { display: flex; align-items: center; gap: 10px; margin: 0 0 8px; flex-wrap: wrap; }
  .sheet-op.hidden { display: none; }
  .sheet-op .op-name { font-size: 14px; color: var(--text); font-weight: 600; }
  .btn-take {
    background: var(--accent); color: #fff; border: none; border-radius: 9px;
    padding: 7px 14px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
  }

  .add-row { display: flex; gap: 8px; margin: 10px 0 0; flex: 0 0 auto; }
  .add-row input {
    flex: 1; font-size: 16px; /* >=16px спира авто-зум в iOS */
    padding: 12px; border-radius: 10px; border: 1px solid #3a4a5a;
    background: var(--panel-2); color: var(--text);
  }
  .add-row button {
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    font-size: 16px; font-weight: 700; padding: 0 16px; cursor: pointer;
  }

  .items { list-style: none; margin: 0; padding: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1 1 auto; min-height: 60px; }
  .item {
    display: flex; align-items: center; gap: 10px;
    background: var(--panel-2); border-radius: 12px; padding: 12px;
    margin-bottom: 8px;
  }
  .item .check {
    width: 30px; height: 30px; border-radius: 8px; border: 2px solid var(--muted);
    background: transparent; color: #fff; font-size: 18px; line-height: 1;
    display: flex; align-items: center; justify-content: center; flex: 0 0 auto; cursor: pointer;
  }
  .item.done .check { background: var(--free); border-color: var(--free); }
  .item .label { flex: 1; font-size: 16px; word-break: break-word; }
  .item.done .label { text-decoration: line-through; color: var(--muted); }
  .item .del { background: transparent; border: none; color: #f87171; font-size: 20px; cursor: pointer; padding: 4px 8px; }
  .empty { color: var(--muted); text-align: center; padding: 18px 0; font-size: 14px; }

  .actions { display: flex; gap: 8px; margin: 4px 0 10px; flex: 0 0 auto; }
  .actions button { flex: 1; font-size: 15px; font-weight: 700; padding: 13px; border-radius: 12px; border: none; cursor: pointer; }
  .btn-all { background: var(--busy); color: #fff; }
  .btn-clear { background: #475569; color: #fff; }
  .btn-all:disabled, .btn-clear:disabled { opacity: .45; cursor: default; }

  /* Голям бутон за изход най-долу */
  .btn-exit {
    margin: 10px 0 0; flex: 0 0 auto; width: 100%;
    background: #475569; color: #fff; border: none; border-radius: 12px;
    padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .btn-exit:active { background: #3a475a; }

  /* ===== Таймер по масите ===== */
  .table .timer {
    font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums;
    background: rgba(0,0,0,.22); padding: 1px 7px; border-radius: 8px;
  }

  /* ===== Ред за кухнята ===== */
  .queue { margin: 12px 0 4px; background: var(--panel); border-radius: 14px; padding: 10px 10px 4px; }
  .queue h2 {
    font-size: 14px; margin: 0 0 8px 2px; color: #fbbf24;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .qrow {
    display: flex; align-items: center; gap: 10px; width: 100%;
    text-align: left; border: none; cursor: pointer; font-family: inherit;
    background: var(--panel-2); color: var(--text);
    border-radius: 10px; padding: 10px; margin-bottom: 6px;
  }
  .qrow .pos {
    background: var(--waiting); color: #fff; font-weight: 800;
    min-width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 13px; flex: 0 0 auto;
  }
  .qrow .qmain { flex: 1; min-width: 0; }
  .qrow .qtitle { font-size: 16px; font-weight: 700; }
  .qrow .qsub { font-size: 12px; color: var(--muted); }
  .qrow .timer { font-variant-numeric: tabular-nums; font-weight: 700; font-size: 17px; color: #fca5a5; flex: 0 0 auto; }

  /* ===== Таймер в панела ===== */
  .sheet-timer { font-size: 14px; color: var(--muted); margin: 0 0 8px; font-variant-numeric: tabular-nums; }
  .sheet-timer b { color: var(--text); font-size: 16px; }
  .sheet-timer.hidden { display: none; }

  /* ===== Брояч за количество ===== */
  .qty-row { display: flex; gap: 6px; align-items: center; margin: 8px 0 0; flex: 0 0 auto; }
  .qty-label { font-size: 12px; color: var(--muted); margin-right: 2px; flex: 0 0 auto; }
  .qty-btn {
    flex: 1; background: var(--panel-2); color: var(--text);
    border: 1px solid #3a4a5a; border-radius: 10px; padding: 9px 0;
    font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .qty-btn.sel { background: var(--accent); border-color: var(--accent); color: #fff; }
  /* Стъпер за порции: −  брой  + */
  .item .stepper { display: flex; align-items: center; gap: 6px; flex: 0 0 auto; }
  .item .stepper button {
    width: 34px; height: 34px; border-radius: 9px; border: none;
    font-size: 22px; font-weight: 800; line-height: 1; cursor: pointer; color: #fff;
    display: flex; align-items: center; justify-content: center; font-family: inherit;
  }
  .item .minus { background: var(--waiting); }   /* червен */
  .item .plus  { background: var(--free); }       /* зелен */
  .item .stepper button:disabled { opacity: .4; cursor: default; }
  .item .qcount { min-width: 20px; text-align: center; font-weight: 800; font-size: 17px; }
  .item.done .qcount { color: var(--muted); }

  /* ===== Оператор пикер ===== */
  .op-list { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
  .op-item {
    background: var(--panel-2); color: var(--text); border: 1px solid #3a4a5a;
    border-radius: 12px; padding: 16px; font-size: 17px; font-weight: 700;
    cursor: pointer; font-family: inherit; text-align: left;
  }
  .op-item.sel { background: var(--accent); border-color: var(--accent); color: #fff; }
  .op-sheet { max-height: calc(100% - 80px); }
</style>
</head>
<body>
  <header class="app-head">
    <h1>🍽️ Маси</h1>
    <div class="legend">
      <span><i class="dot free"></i>Свободна</span>
      <span><i class="dot waiting"></i>Чака ястия</span>
      <span><i class="dot busy"></i>Заета</span>
    </div>
  </header>

  <div class="topbar">
    <button id="meBtn" class="me-btn">👤 Аз: избери</button>
    <span id="syncEl" class="sync">…</span>
  </div>
  <div class="opfilter" id="opFilter"></div>

  <main id="zones"></main>

  <!-- Панел за избрана маса -->
  <div class="overlay" id="overlay">
    <div class="sheet" role="dialog" aria-modal="true">
      <div class="sheet-head">
        <h3 id="sheetTitle">Маса</h3>
        <div style="display:flex; align-items:center; gap:8px;">
          <span class="status-pill" id="statusPill">Свободна</span>
          <button class="close-btn" id="closeBtn" aria-label="Затвори">×</button>
        </div>
      </div>

      <div class="sheet-timer hidden" id="sheetTimer"></div>
      <div class="sheet-op hidden" id="sheetOp"></div>

      <div class="actions">
        <button class="btn-all" id="allBtn">✓ Занесох всичко</button>
        <button class="btn-clear" id="clearBtn">🧹 Изчисти масата</button>
      </div>

      <ul class="items" id="itemList"></ul>

      <div class="qty-row" id="qtyRow">
        <span class="qty-label">Брой:</span>
        <button class="qty-btn sel" type="button" data-qty="1">1×</button>
        <button class="qty-btn" type="button" data-qty="2">2×</button>
        <button class="qty-btn" type="button" data-qty="3">3×</button>
        <button class="qty-btn" type="button" data-qty="4">4×</button>
      </div>

      <div class="add-row">
        <input id="itemInput" type="text" inputmode="text" autocomplete="off"
               placeholder="Ястие (напр. Шопска салата)" enterkeyhint="done">
        <button id="addBtn">Добави</button>
      </div>

      <button class="btn-exit" id="exitBtn" type="button">✕ Изход от масата</button>
    </div>
  </div>

  <!-- Избор на оператор (кой съм аз) -->
  <div class="overlay" id="opOverlay">
    <div class="sheet op-sheet" role="dialog" aria-modal="true">
      <div class="sheet-head">
        <h3>Кой оператор си?</h3>
        <button class="close-btn" id="opCloseBtn" aria-label="Затвори">×</button>
      </div>
      <div class="op-list" id="opList"></div>
    </div>
  </div>

<script>
(function () {
  "use strict";
  var STORAGE_KEY = "restaurant_tables_v1";
  var OP_KEY = "operator_name_v1";

  // ====== Firebase (споделена база) ======
  var firebaseConfig = {
    apiKey: "AIzaSyCeGVpoz0ztyX7wfbO-BxpNCqlUrmESw-Y",
    authDomain: "restuarant-9914f.firebaseapp.com",
    databaseURL: "https://restuarant-9914f-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "restuarant-9914f",
    storageBucket: "restuarant-9914f.firebasestorage.app",
    messagingSenderId: "269187387875",
    appId: "1:269187387875:web:61b3c7cd74ba7baafcd0d6",
    measurementId: "G-2T32KB3DNG"
  };
  var db = null;
  try {
    if (window.firebase && firebaseConfig.databaseURL) {
      firebase.initializeApp(firebaseConfig);
      db = firebase.database();
    }
  } catch (e) { db = null; }

  // ====== Оператори ======
  // Имената може да се сменят/добавят свободно.
  var OPERATORS = [
    "Алина", "Башак", "Нико", "Ники", "Дилек", "Айлен"
  ];
  var currentOperator = "";
  try { currentOperator = localStorage.getItem(OP_KEY) || ""; } catch (e) {}
  var filterOperator = null; // null = всички

  // Дефиниция на залите и масите
  var ZONES = [
    { id: "salon",   name: "Салон",   tables: range(1, 14) },
    { id: "garden",  name: "Градина", tables: range(21, 28) },
    { id: "terrace", name: "Тераса",  tables: range(31, 38) }
  ];

  function range(a, b) { var r = []; for (var i = a; i <= b; i++) r.push(i); return r; }

  // ----- Състояние -----
  // state.tables[номер] = { items: [{ text, done, qty }], orderedAt, operator }
  var state = load();
  migrate();

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { tables: {} };
  }
  function saveLocal() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  }
  // Записва промяна: локално + в облака (за конкретната маса)
  function save() {
    // махни празните маси от локалното състояние (без текущо отворената)
    Object.keys(state.tables).forEach(function (k) {
      var t = state.tables[k];
      if ((!t || !t.items || !t.items.length) && String(k) !== String(current)) {
        delete state.tables[k];
      }
    });
    saveLocal();
    if (current != null) persistTable(current);
  }
  function persistTable(num) {
    if (!db) return;
    var t = state.tables[num];
    var ref = db.ref("tables/" + num);
    if (!t || !t.items || !t.items.length) ref.remove().catch(function () {});
    else ref.set(t).catch(function () {});
  }
  // Съвместимост: добавя orderedAt (таймер), qty (количество), operator
  function migrate() {
    if (!state.tables) state.tables = {};
    Object.keys(state.tables).forEach(function (num) {
      var t = state.tables[num];
      if (!t) { delete state.tables[num]; return; }
      if (!t.items) t.items = [];
      t.items.forEach(function (it) { if (!it.qty) it.qty = 1; });
      if (t.items.length && !t.orderedAt) t.orderedAt = Date.now();
      if (!t.items.length) t.orderedAt = null;
      if (typeof t.operator === "undefined") t.operator = null;
    });
  }
  function tableData(num) {
    if (!state.tables[num]) state.tables[num] = { items: [], orderedAt: null, operator: null };
    return state.tables[num];
  }

  // Форматира изминало време като MM:SS (или H:MM:SS над час)
  function fmt(ms) {
    if (ms < 0) ms = 0;
    var s = Math.floor(ms / 1000);
    var h = Math.floor(s / 3600); s -= h * 3600;
    var m = Math.floor(s / 60); var sec = s - m * 60;
    function p(n) { return (n < 10 ? "0" : "") + n; }
    return h > 0 ? h + ":" + p(m) + ":" + p(sec) : p(m) + ":" + p(sec);
  }
  function tick() {
    var now = Date.now();
    var els = document.querySelectorAll("[data-ts]");
    for (var i = 0; i < els.length; i++) {
      var ts = parseInt(els[i].getAttribute("data-ts"), 10);
      if (ts) els[i].textContent = fmt(now - ts);
    }
  }

  // Връща статуса на маса: free | waiting | busy
  function statusOf(num) {
    var t = state.tables[num];
    if (!t || !t.items || t.items.length === 0) return "free";
    var anyUndone = t.items.some(function (it) { return !it.done; });
    return anyUndone ? "waiting" : "busy";
  }
  var STATUS_TEXT = { free: "Свободна", waiting: "Чака ястия", busy: "Заета" };

  // ====== Оператор: лента и пикер ======
  var meBtn = document.getElementById("meBtn");
  var syncEl = document.getElementById("syncEl");
  var opFilter = document.getElementById("opFilter");
  var opOverlay = document.getElementById("opOverlay");
  var opList = document.getElementById("opList");

  function updateMeBtn() {
    meBtn.textContent = "👤 Аз: " + (currentOperator || "избери");
  }
  function setOperator(name) {
    currentOperator = name;
    try { localStorage.setItem(OP_KEY, name); } catch (e) {}
    updateMeBtn();
    renderFilter();
  }
  function renderFilter() {
    opFilter.innerHTML = "";
    opFilter.appendChild(filterChip("Всички", filterOperator === null, function () {
      filterOperator = null; renderFilter(); renderAll();
    }));
    OPERATORS.forEach(function (name) {
      opFilter.appendChild(filterChip(name, filterOperator === name, function () {
        filterOperator = (filterOperator === name ? null : name);
        renderFilter(); renderAll();
      }));
    });
  }
  function filterChip(text, sel, onClick) {
    var b = document.createElement("button");
    b.className = "opchip" + (sel ? " sel" : "");
    b.type = "button"; b.textContent = text;
    b.addEventListener("click", onClick);
    return b;
  }
  function openOpPicker() {
    opList.innerHTML = "";
    OPERATORS.forEach(function (name) {
      var b = document.createElement("button");
      b.className = "op-item" + (name === currentOperator ? " sel" : "");
      b.type = "button"; b.textContent = name;
      b.addEventListener("click", function () {
        setOperator(name);
        opOverlay.classList.remove("open");
        renderAll();
        if (overlay.classList.contains("open")) renderSheet();
      });
      opList.appendChild(b);
    });
    opOverlay.classList.add("open");
  }
  meBtn.addEventListener("click", openOpPicker);
  document.getElementById("opCloseBtn").addEventListener("click", function () { opOverlay.classList.remove("open"); });
  opOverlay.addEventListener("click", function (e) { if (e.target === opOverlay) opOverlay.classList.remove("open"); });

  function updateSync() {
    if (!db) { syncEl.textContent = "📴 Само на този телефон"; return; }
    syncEl.textContent = connected ? "🟢 На живо" : "🔴 Свързване…";
  }
  var connected = false;

  // ----- Рендиране на масите -----
  var zonesEl = document.getElementById("zones");

  function renderAll() {
    zonesEl.innerHTML = "";
    var q = renderQueue();
    if (q) zonesEl.appendChild(q);
    ZONES.forEach(function (zone) {
      var sec = document.createElement("section");
      sec.className = "zone";
      var h = document.createElement("h2");
      h.textContent = zone.name;
      sec.appendChild(h);
      var grid = document.createElement("div");
      grid.className = "grid";
      zone.tables.forEach(function (num) {
        grid.appendChild(tableTile(num));
      });
      sec.appendChild(grid);
      zonesEl.appendChild(sec);
    });
    tick();
  }

  // Ред за кухнята: чакащите маси, подредени по време на поръчка (най-старите горе)
  function renderQueue() {
    var waiting = [];
    ZONES.forEach(function (zone) {
      zone.tables.forEach(function (num) {
        if (statusOf(num) === "waiting") {
          var t = state.tables[num];
          waiting.push({ num: num, zone: zone.name, ts: t.orderedAt || 0,
            operator: t.operator || "",
            pending: t.items.filter(function (it) { return !it.done; }).length });
        }
      });
    });
    if (!waiting.length) return null;
    waiting.sort(function (a, b) { return a.ts - b.ts; });

    var sec = document.createElement("section");
    sec.className = "queue";
    var h = document.createElement("h2");
    h.textContent = "🍳 Ред за кухнята";
    sec.appendChild(h);

    waiting.forEach(function (w, i) {
      var row = document.createElement("button");
      row.className = "qrow";
      row.type = "button";

      var pos = document.createElement("span");
      pos.className = "pos"; pos.textContent = (i + 1);
      row.appendChild(pos);

      var main = document.createElement("div");
      main.className = "qmain";
      var title = document.createElement("div");
      title.className = "qtitle";
      title.textContent = "Маса " + w.num + " · " + w.zone;
      var sub = document.createElement("div");
      sub.className = "qsub";
      var subTxt = (w.pending === 1 ? "1 ястие" : w.pending + " ястия") + " за носене";
      if (w.operator) subTxt += " · 👤 " + w.operator;
      sub.textContent = subTxt;
      main.appendChild(title); main.appendChild(sub);
      row.appendChild(main);

      var tm = document.createElement("span");
      tm.className = "timer";
      tm.setAttribute("data-ts", w.ts);
      tm.textContent = fmt(Date.now() - w.ts);
      row.appendChild(tm);

      row.addEventListener("click", function () { openSheet(w.num); });
      sec.appendChild(row);
    });
    return sec;
  }

  function tableTile(num) {
    var st = statusOf(num);
    var t = state.tables[num];
    var btn = document.createElement("button");
    btn.className = "table " + st;
    btn.type = "button";

    var n = document.createElement("div");
    n.className = "num"; n.textContent = num;
    btn.appendChild(n);

    var s = document.createElement("div");
    s.className = "st"; s.textContent = STATUS_TEXT[st];
    btn.appendChild(s);

    if (st !== "free" && t && t.operator) {
      var op = document.createElement("div");
      op.className = "op"; op.textContent = "👤 " + t.operator;
      btn.appendChild(op);
    }

    if (st !== "free" && t && t.orderedAt) {
      var tm = document.createElement("div");
      tm.className = "timer";
      tm.setAttribute("data-ts", t.orderedAt);
      tm.textContent = fmt(Date.now() - t.orderedAt);
      btn.appendChild(tm);
    }

    if (t && t.items && t.items.length) {
      var done = t.items.filter(function (it) { return it.done; }).length;
      var b = document.createElement("div");
      b.className = "badge";
      b.textContent = done + "/" + t.items.length;
      btn.appendChild(b);
    }

    // Подсветка/затъмняване при филтър по оператор
    if (filterOperator) {
      if (t && t.operator === filterOperator) btn.classList.add("hl");
      else btn.classList.add("dim");
    }

    btn.addEventListener("click", function () { openSheet(num); });
    return btn;
  }

  // ----- Панел за маса -----
  var overlay = document.getElementById("overlay");
  var sheetTitle = document.getElementById("sheetTitle");
  var statusPill = document.getElementById("statusPill");
  var sheetOp = document.getElementById("sheetOp");
  var itemInput = document.getElementById("itemInput");
  var itemList = document.getElementById("itemList");
  var addBtn = document.getElementById("addBtn");
  var allBtn = document.getElementById("allBtn");
  var clearBtn = document.getElementById("clearBtn");
  var closeBtn = document.getElementById("closeBtn");
  var sheetTimer = document.getElementById("sheetTimer");
  var qtyRow = document.getElementById("qtyRow");
  var current = null;
  var selQty = 1; // избрано количество за следващото ястие (1–4)

  qtyRow.addEventListener("click", function (e) {
    var b = e.target.closest(".qty-btn");
    if (!b) return;
    selQty = parseInt(b.getAttribute("data-qty"), 10) || 1;
    setQtyButtons();
    itemInput.focus();
  });
  function setQtyButtons() {
    var btns = qtyRow.querySelectorAll(".qty-btn");
    for (var i = 0; i < btns.length; i++) {
      var q = parseInt(btns[i].getAttribute("data-qty"), 10);
      btns[i].classList.toggle("sel", q === selQty);
    }
  }

  function openSheet(num) {
    current = num;
    selQty = 1;
    setQtyButtons();
    renderSheet();
    overlay.classList.add("open");
    setTimeout(function () { fitKeyboard(); itemInput.focus(); scrollItemsBottom(); }, 150);
  }
  function closeSheet() {
    overlay.classList.remove("open");
    resetKeyboardFit();
    current = null;
    renderAll();
  }

  function scrollItemsBottom() {
    itemList.scrollTop = itemList.scrollHeight;
  }

  function fitKeyboard() {
    var vv = window.visualViewport;
    if (!vv || !overlay.classList.contains("open")) return;
    overlay.style.top = vv.offsetTop + "px";
    overlay.style.height = vv.height + "px";
    overlay.style.bottom = "auto";
    overlay.classList.toggle("kb", (window.innerHeight - vv.height) > 100);
  }
  function resetKeyboardFit() {
    overlay.style.top = "";
    overlay.style.height = "";
    overlay.style.bottom = "";
    overlay.classList.remove("kb");
  }
  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", fitKeyboard);
    window.visualViewport.addEventListener("scroll", fitKeyboard);
  }

  function renderSheet() {
    if (current == null) return;
    var t = tableData(current);
    var st = statusOf(current);
    sheetTitle.textContent = "Маса " + current;
    statusPill.textContent = STATUS_TEXT[st];
    statusPill.className = "status-pill " + st;

    if (st !== "free" && t.orderedAt) {
      sheetTimer.classList.remove("hidden");
      sheetTimer.innerHTML = "⏱️ Чака от <b data-ts=\"" + t.orderedAt + "\">" +
        fmt(Date.now() - t.orderedAt) + "</b>";
    } else {
      sheetTimer.classList.add("hidden");
      sheetTimer.innerHTML = "";
    }

    renderSheetOp(t, st);

    var keepScroll = itemList.scrollTop;
    itemList.innerHTML = "";
    if (!t.items.length) {
      var e = document.createElement("li");
      e.className = "empty";
      e.textContent = "Няма поръчки. Добави поръчка отдолу.";
      itemList.appendChild(e);
    } else {
      t.items.forEach(function (it, idx) {
        itemList.appendChild(itemRow(it, idx));
      });
    }
    itemList.scrollTop = keepScroll;
    var hasItems = t.items.length > 0;
    var allDone = hasItems && t.items.every(function (it) { return it.done; });
    allBtn.disabled = !hasItems || allDone;
    clearBtn.disabled = !hasItems;
  }

  // Ред "оператор" в панела
  function renderSheetOp(t, st) {
    if (st === "free") { sheetOp.classList.add("hidden"); sheetOp.innerHTML = ""; return; }
    sheetOp.classList.remove("hidden");
    sheetOp.innerHTML = "";
    var label = document.createElement("span");
    label.className = "op-name";
    label.textContent = "👤 Оператор: " + (t.operator || "никой");
    sheetOp.appendChild(label);
    if (t.operator !== currentOperator) {
      var take = document.createElement("button");
      take.className = "btn-take"; take.type = "button"; take.textContent = "Поеми масата";
      take.addEventListener("click", function () {
        if (!currentOperator) { openOpPicker(); return; }
        tableData(current).operator = currentOperator;
        save(); renderSheet();
      });
      sheetOp.appendChild(take);
    }
  }

  function itemRow(it, idx) {
    var li = document.createElement("li");
    li.className = "item" + (it.done ? " done" : "");

    var chk = document.createElement("button");
    chk.className = "check";
    chk.type = "button";
    chk.textContent = it.done ? "✓" : "";
    chk.setAttribute("aria-label", "Отметни като занесено");
    chk.addEventListener("click", function () {
      it.done = !it.done;
      save(); renderSheet();
    });
    li.appendChild(chk);

    var lab = document.createElement("span");
    lab.className = "label";
    lab.textContent = it.text;
    li.appendChild(lab);

    // Стъпер за порции: − (червено) брой + (зелено)
    var stp = document.createElement("div");
    stp.className = "stepper";

    var minus = document.createElement("button");
    minus.className = "minus"; minus.type = "button"; minus.textContent = "−";
    minus.setAttribute("aria-label", "Махни порция");
    minus.addEventListener("click", function () {
      var items = tableData(current).items;
      if (it.qty > 1) it.qty -= 1;
      else items.splice(idx, 1); // последната порция → маха реда
      save(); renderSheet();
    });
    stp.appendChild(minus);

    var cnt = document.createElement("span");
    cnt.className = "qcount"; cnt.textContent = it.qty;
    stp.appendChild(cnt);

    var plus = document.createElement("button");
    plus.className = "plus"; plus.type = "button"; plus.textContent = "+";
    plus.setAttribute("aria-label", "Добави порция");
    plus.disabled = it.qty >= 4;
    plus.addEventListener("click", function () {
      if (it.qty < 4) { it.qty += 1; save(); renderSheet(); }
    });
    stp.appendChild(plus);

    li.appendChild(stp);

    var del = document.createElement("button");
    del.className = "del";
    del.type = "button";
    del.textContent = "🗑";
    del.setAttribute("aria-label", "Изтрий");
    del.addEventListener("click", function () {
      tableData(current).items.splice(idx, 1);
      save(); renderSheet();
    });
    li.appendChild(del);
    return li;
  }

  function addItem() {
    var txt = itemInput.value.trim();
    if (!txt) return;
    var t = tableData(current);
    if (!t.orderedAt) t.orderedAt = Date.now(); // старт на таймера при първата поръчка
    if (!t.operator && currentOperator) t.operator = currentOperator; // авто-поемане
    t.items.push({ text: txt, done: false, qty: selQty });
    itemInput.value = "";
    selQty = 1; setQtyButtons();
    save(); renderSheet();
    scrollItemsBottom();
    itemInput.focus();
  }

  itemInput.addEventListener("focus", function () {
    setTimeout(function () { fitKeyboard(); scrollItemsBottom(); }, 100);
  });

  addBtn.addEventListener("click", addItem);
  itemInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") { e.preventDefault(); addItem(); }
  });

  allBtn.addEventListener("click", function () {
    var t = tableData(current);
    t.items.forEach(function (it) { it.done = true; });
    save(); renderSheet();
  });

  clearBtn.addEventListener("click", function () {
    if (!confirm("Да изчистя маса " + current + " и да я освободя?")) return;
    state.tables[current] = { items: [], orderedAt: null, operator: null };
    save(); renderSheet();
  });

  closeBtn.addEventListener("click", closeSheet);
  document.getElementById("exitBtn").addEventListener("click", closeSheet);
  overlay.addEventListener("click", function (e) {
    if (e.target === overlay) closeSheet();
  });

  // ====== Жива синхронизация с облака ======
  function startSync() {
    if (!db) return;
    db.ref(".info/connected").on("value", function (s) {
      connected = (s.val() === true);
      updateSync();
    });
    db.ref("tables").on("value", function (snap) {
      var remote = snap.val();
      if (remote == null) {
        // облакът е празен — качи наличните локални маси веднъж
        var keys = Object.keys(state.tables);
        var any = keys.some(function (k) { var t = state.tables[k]; return t && t.items && t.items.length; });
        if (any) {
          keys.forEach(function (k) {
            var t = state.tables[k];
            if (t && t.items && t.items.length) db.ref("tables/" + k).set(t).catch(function () {});
          });
        }
        return;
      }
      state.tables = remote;
      migrate();
      saveLocal();
      renderAll();
      if (overlay.classList.contains("open")) renderSheet();
    });
  }

  // ----- Старт -----
  updateMeBtn();
  renderFilter();
  updateSync();
  setQtyButtons();
  renderAll();
  startSync();
  setInterval(tick, 1000);
  if (!currentOperator) openOpPicker(); // при първо отваряне — избери кой си

  // Регистрация на service worker за офлайн работа + авто-обновяване
  if ("serviceWorker" in navigator) {
    var refreshing = false;
    navigator.serviceWorker.addEventListener("controllerchange", function () {
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").then(function (reg) {
        reg.update();
      }).catch(function () {});
    });
  }
})();
</script>
</body>
</html>
